<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="google-site-verification"
            content="rSzWyzOwZuTZHkHtzyQBWaKgpEPY18IX2zcZB9OaZH4"
        />
        <meta
            name="description"
            content="BrothersInGames - independent studio crafting mobile games and everyday apps. Def the Base, Jumping Jello, Birthday & Name Day Reminder."
        />
        <meta name="theme-color" content="#f4f5fa" media="(prefers-color-scheme: light)" />
        <meta name="theme-color" content="#0a0a12" media="(prefers-color-scheme: dark)" />
        <link rel="icon" type="image/png" href="/images/logos/logo-big-white-and-black.png" />
        <title>BrothersInGames</title>
        <!-- Apply the saved/system theme before first paint to avoid a flash of the
             wrong theme. Mirrors the logic in src/hooks/useTheme.ts. -->
        <script>
            ;(function () {
                try {
                    var stored = localStorage.getItem('theme')
                    var dark = stored
                        ? stored === 'dark'
                        : window.matchMedia('(prefers-color-scheme: dark)').matches
                    if (dark) document.documentElement.classList.add('dark')
                } catch (e) {}
            })()
        </script>
        <!-- GitHub Pages SPA redirect restore -->
        <script>
            ;(function (l) {
                if (l.search[1] === '/') {
                    var decoded = l.search
                        .slice(1)
                        .split('&')
                        .map(function (s) {
                            return s.replace(/~and~/g, '&')
                        })
                    window.history.replaceState(
                        null,
                        null,
                        decoded[0] + (decoded[1] ? '&' + decoded[1] : '') + l.hash
                    )
                }
            })(window.location)
        </script>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
