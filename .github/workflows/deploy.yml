name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build
        env:
          # Def the Base (primary project — also used for the global sign-in/header)
          VITE_FB_DEF_THE_BASE_API_KEY: ${{ secrets.VITE_FB_DEF_THE_BASE_API_KEY }}
          VITE_FB_DEF_THE_BASE_AUTH_DOMAIN: ${{ secrets.VITE_FB_DEF_THE_BASE_AUTH_DOMAIN }}
          VITE_FB_DEF_THE_BASE_PROJECT_ID: ${{ secrets.VITE_FB_DEF_THE_BASE_PROJECT_ID }}
          VITE_FB_DEF_THE_BASE_STORAGE_BUCKET: ${{ secrets.VITE_FB_DEF_THE_BASE_STORAGE_BUCKET }}
          VITE_FB_DEF_THE_BASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FB_DEF_THE_BASE_MESSAGING_SENDER_ID }}
          VITE_FB_DEF_THE_BASE_APP_ID: ${{ secrets.VITE_FB_DEF_THE_BASE_APP_ID }}
          # Jumping Jello (secondary project)
          VITE_FB_JUMPING_JELLO_API_KEY: ${{ secrets.VITE_FB_JUMPING_JELLO_API_KEY }}
          VITE_FB_JUMPING_JELLO_AUTH_DOMAIN: ${{ secrets.VITE_FB_JUMPING_JELLO_AUTH_DOMAIN }}
          VITE_FB_JUMPING_JELLO_PROJECT_ID: ${{ secrets.VITE_FB_JUMPING_JELLO_PROJECT_ID }}
          VITE_FB_JUMPING_JELLO_STORAGE_BUCKET: ${{ secrets.VITE_FB_JUMPING_JELLO_STORAGE_BUCKET }}
          VITE_FB_JUMPING_JELLO_MESSAGING_SENDER_ID: ${{ secrets.VITE_FB_JUMPING_JELLO_MESSAGING_SENDER_ID }}
          VITE_FB_JUMPING_JELLO_APP_ID: ${{ secrets.VITE_FB_JUMPING_JELLO_APP_ID }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
